<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ec4899" />
  <title>Taller · Órdenes pendientes</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Taller" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-config.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--pink:#ec4899;--magenta:#db2777;--green:#22c55e;--bg:#fbf7f2;--card:#ffffff;--text:#1a1414;--muted:rgba(26,20,20,0.5);--border:rgba(0,0,0,0.08)}
    html,body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh}

    /* Topbar */
    .topbar{position:sticky;top:0;z-index:100;background:rgba(251,247,242,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .topbar__brand{display:flex;align-items:center;gap:10px}
    .topbar__dot{width:10px;height:10px;border-radius:50%;background:#d1d5db;transition:background 0.4s}
    .topbar__dot.online{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,0.2)}
    .topbar__title{font-family:'Fraunces',serif;font-size:17px;font-weight:900;letter-spacing:-0.02em;color:var(--text)}
    .topbar__sub{font-size:12px;font-weight:600;color:var(--muted)}
    .topbar__count{background:linear-gradient(135deg,var(--pink),var(--magenta));color:#fff;font-size:12px;font-weight:800;padding:4px 10px;border-radius:999px;min-width:28px;text-align:center}

    /* Layout */
    .container{max-width:1100px;margin:0 auto;padding:24px 16px 80px}

    /* Filtros */
    .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
    .fchip{border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;padding:8px 16px;border-radius:999px;cursor:pointer;transition:all 0.15s}
    .fchip.active{background:linear-gradient(135deg,var(--pink),var(--magenta));color:#fff;border-color:transparent;box-shadow:0 4px 12px -2px rgba(219,39,119,0.4)}

    /* Grid */
    .grid{display:grid;grid-template-columns:1fr;gap:16px}
    @media(min-width:600px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media(min-width:1000px){.grid{grid-template-columns:repeat(3,1fr)}}

    /* Tarjeta */
    .card{background:var(--card);border-radius:20px;box-shadow:0 2px 16px -6px rgba(0,0,0,0.10),0 1px 4px -2px rgba(0,0,0,0.06);border:1.5px solid var(--border);overflow:hidden;display:flex;flex-direction:column}
    .card__bar{height:4px;width:100%}
    .card__bar--pendiente{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
    .card__bar--con-duda{background:linear-gradient(90deg,var(--pink),var(--magenta))}
    .card__bar--lista{background:linear-gradient(90deg,var(--green),#16a34a)}
    .card__body{padding:16px 18px;flex:1;display:flex;flex-direction:column;gap:12px}
    .card__head{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .card__num{font-family:'Fraunces',serif;font-size:22px;font-weight:900;color:var(--text)}
    .card__badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:0.04em}
    .badge--pendiente{background:rgba(245,158,11,0.12);color:#b45309;border:1.5px solid rgba(245,158,11,0.3)}
    .badge--con-duda{background:rgba(236,72,153,0.10);color:var(--magenta);border:1.5px solid rgba(236,72,153,0.25)}
    .badge--lista{background:rgba(34,197,94,0.12);color:#15803d;border:1.5px solid rgba(34,197,94,0.3)}
    .card__client{font-size:17px;font-weight:800;color:var(--text);line-height:1.2}
    .card__date{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--magenta);background:rgba(236,72,153,0.08);padding:7px 12px;border-radius:10px}
    .card__pinata{background:rgba(0,0,0,0.025);border:1px solid var(--border);border-radius:14px;padding:12px 14px;font-size:13.5px}
    .card__pinata-type{font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:8px}
    .card__colors{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
    .card__color-chip{display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--border);border-radius:999px;padding:4px 10px;font-size:12.5px;font-weight:700}
    .card__color-dot{width:13px;height:13px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.1);flex-shrink:0}
    .card__tematica{font-weight:700;font-size:13.5px;margin-top:4px;color:var(--text)}
    .card__thumb{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:10px;display:block;margin-bottom:8px;cursor:pointer;transition:opacity 0.15s}
    .card__thumb:hover{opacity:0.9}
    .card__desc{font-size:13.5px;line-height:1.5;color:var(--text);white-space:pre-wrap;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

    /* Footer tarjeta — 3 botones */
    .card__footer{padding:10px 14px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .card__footer--lista{grid-template-columns:1fr}
    .btn-base{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;border-radius:13px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;border:0;transition:transform 0.14s,box-shadow 0.14s;text-align:center}
    .btn-base:active{transform:scale(0.97)}
    .btn-verde{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;box-shadow:0 5px 14px -4px rgba(34,197,94,0.45);grid-column:1/-1}
    .btn-verde:hover{transform:translateY(-1px)}
    .btn-verde--done{background:rgba(34,197,94,0.10);color:#15803d;box-shadow:none;border:1.5px solid rgba(34,197,94,0.3);cursor:default;grid-column:1/-1}
    .btn-gris{background:rgba(0,0,0,0.04);color:var(--text);border:1.5px solid var(--border)}
    .btn-gris:hover{background:rgba(0,0,0,0.08)}
    .btn-wa{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;box-shadow:0 5px 14px -4px rgba(37,211,102,0.4)}
    .btn-wa:hover{transform:translateY(-1px)}
    .btn-wa:disabled{opacity:0.4;cursor:not-allowed;transform:none}

    /* Modal */
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:none;backdrop-filter:blur(4px)}
    .modal-backdrop.open{display:flex;align-items:flex-end;justify-content:center}
    @media(min-width:640px){.modal-backdrop.open{align-items:center}}
    .modal-box{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:640px;max-height:92dvh;overflow-y:auto;display:flex;flex-direction:column;animation:slideUp 0.3s cubic-bezier(.22,1,.36,1)}
    @media(min-width:640px){.modal-box{border-radius:24px;max-height:88dvh}}
    @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-header{padding:18px 20px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:1}
    .modal-title{font-family:'Fraunces',serif;font-size:19px;font-weight:900}
    .modal-close{border:0;background:rgba(0,0,0,0.06);color:var(--text);width:34px;height:34px;border-radius:50%;cursor:pointer;display:grid;place-items:center;font-size:18px;transition:background 0.15s}
    .modal-close:hover{background:rgba(0,0,0,0.12)}
    .modal-body{padding:20px;display:flex;flex-direction:column;gap:16px}

    /* Detalle */
    .det-photo{width:100%;border-radius:16px;display:block;max-height:380px;object-fit:cover}
    .det-section{display:flex;flex-direction:column;gap:6px}
    .det-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:4px}
    .det-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,0.05);font-size:14px}
    .det-lbl{color:var(--muted);font-weight:600;font-size:13px;white-space:nowrap}
    .det-colors{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
    .det-chip{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,0.03);border:1.5px solid var(--border);border-radius:999px;padding:5px 12px;font-size:13px;font-weight:700}
    .det-dot{width:15px;height:15px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.12);flex-shrink:0}
    .det-desc{font-size:14px;line-height:1.6;color:var(--text);background:rgba(0,0,0,0.025);padding:12px;border-radius:12px;white-space:pre-wrap}
    .det-tema{font-size:15px;font-weight:700;padding:10px 14px;background:rgba(236,72,153,0.07);border-radius:12px}

    /* Modal duda */
    .duda-info{font-size:13px;font-weight:600;color:var(--muted);padding:10px 14px;background:rgba(0,0,0,0.03);border-radius:12px}
    .duda-label{font-size:14px;font-weight:700;margin-bottom:6px}
    .duda-textarea{width:100%;border:1.5px solid var(--border);border-radius:14px;padding:12px 14px;font-family:inherit;font-size:14px;resize:vertical;min-height:100px;outline:none;transition:border-color 0.15s;color:var(--text)}
    .duda-textarea:focus{border-color:var(--pink)}
    .duda-actions{display:flex;gap:10px;justify-content:flex-end}
    .duda-cancel{border:1.5px solid var(--border);background:#fff;color:var(--text);font-family:inherit;font-size:14px;font-weight:700;padding:11px 20px;border-radius:13px;cursor:pointer}
    .duda-send{border:0;background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;font-family:inherit;font-size:14px;font-weight:800;padding:11px 22px;border-radius:13px;cursor:pointer;box-shadow:0 5px 14px -4px rgba(37,211,102,0.4);display:flex;align-items:center;gap:8px}

    /* Empty */
    .empty{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty__icon{font-size:56px;margin-bottom:16px}
    .empty h3{font-family:'Fraunces',serif;font-size:22px;color:var(--text);margin-bottom:8px}
    .empty p{font-size:14px}

    /* Toast */
    .toast{position:fixed;bottom:max(24px,env(safe-area-inset-bottom,24px));left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:12px 22px;border-radius:999px;font-size:14px;font-weight:700;opacity:0;pointer-events:none;transition:opacity 0.2s,transform 0.25s cubic-bezier(.22,1,.36,1);z-index:9999;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar__brand">
      <div class="topbar__dot" id="dot"></div>
      <div>
        <div class="topbar__title">Taller · Laureles</div>
        <div class="topbar__sub">Vista de producción</div>
      </div>
    </div>
    <div class="topbar__count" id="countBadge">0</div>
  </header>

  <div class="container">
    <div class="filters" id="filters">
      <button class="fchip active" data-f="activas">Activas</button>
      <button class="fchip" data-f="listas">Listas</button>
      <button class="fchip" data-f="todas">Todas</button>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">
      <div class="empty__icon">🪅</div>
      <h3>Sin órdenes aquí</h3>
      <p>Las nuevas órdenes aparecerán en tiempo real.</p>
    </div>
  </div>

  <!-- Modal: Ver detalle -->
  <div class="modal-backdrop" id="detModal">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="detTitle">Detalle</span>
        <button class="modal-close" id="detClose">✕</button>
      </div>
      <div class="modal-body" id="detBody"></div>
    </div>
  </div>

  <!-- Modal: Preguntar -->
  <div class="modal-backdrop" id="dudaModal">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">Preguntar sobre orden</span>
        <button class="modal-close" id="dudaClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="duda-info" id="dudaInfo"></div>
        <div>
          <div class="duda-label">¿Cuál es tu duda?</div>
          <textarea class="duda-textarea" id="dudaTexto" placeholder="Escribe aquí tu pregunta..."></textarea>
        </div>
        <div class="duda-actions">
          <button class="duda-cancel" id="dudaCancelBtn">Cancelar</button>
          <button class="duda-send" id="dudaSendBtn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
            Abrir WhatsApp
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtDate(ts){
  if(!ts) return "—";
  const d = new Date(ts);
  return d.toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}
function fmtShort(ts){
  if(!ts) return "—";
  const d = new Date(ts);
  return d.toLocaleDateString("es-MX",{weekday:"short",day:"numeric",month:"short"});
}
function showToast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"), 2800);
}

let _sb = null;
let _orders = [];
let _config = {};
let _filter = "activas";
let _dudaOrderId = null;

/* ── Supabase ── */
async function initCloud(){
  const cfg = window.SUPABASE_CONFIG;
  if(!cfg||!cfg.url||!cfg.anonKey) return;
  try {
    _sb = supabase.createClient(cfg.url, cfg.anonKey, {
      realtime:{ params:{ eventsPerSecond:10 } }
    });
    await Promise.all([pullOrders(), pullConfig()]);
    document.getElementById("dot").classList.add("online");
    subscribeRealtime();
  } catch(e){ console.warn("Supabase error:",e); }
}

async function pullOrders(){
  if(!_sb) return;
  const {data,error} = await _sb
    .from("orders")
    .select("id,numero,estado,data,created_at")
    .order("numero",{ascending:false});
  if(error){ console.error(error); return; }
  _orders = (data||[]).map(r=>({
    ...r.data, id:r.id, numero:r.numero, estado:r.estado,
    creada: r.created_at ? new Date(r.created_at).getTime() : Date.now(),
  }));
  render();
}

async function pullConfig(){
  if(!_sb) return;
  const {data} = await _sb.from("app_config").select("whatsapp,nombre").eq("id","default").maybeSingle();
  if(data) _config = data;
}

function subscribeRealtime(){
  if(!_sb) return;
  _sb.channel("taller-rt")
    .on("postgres_changes",{event:"*",schema:"public",table:"orders"},()=>pullOrders())
    .subscribe();
}

async function marcarLista(id, btn){
  if(!_sb){ showToast("Sin conexión"); return; }
  const o = _orders.find(x=>x.id===id);
  if(!o) return;
  btn.disabled = true;
  btn.innerHTML = "Guardando...";
  const {error} = await _sb.from("orders").update({
    estado:"lista",
    data:{...o, estado:"lista"}
  }).eq("id",id);
  if(error){ showToast("Error al actualizar"); btn.disabled=false; return; }
  showToast("¡Marcada como lista!");
}

/* ── Render ── */
function render(){
  const grid  = document.getElementById("grid");
  const empty = document.getElementById("empty");
  document.getElementById("countBadge").textContent = _filter === "activas"
    ? _orders.filter(o=>o.estado!=="lista"&&o.estado!=="entregada").length
    : _filter === "listas"
      ? _orders.filter(o=>o.estado==="lista").length
      : _orders.filter(o=>o.estado!=="entregada").length;

  let list;
  if(_filter==="activas")      list = _orders.filter(o=>o.estado!=="lista"&&o.estado!=="entregada");
  else if(_filter==="listas")  list = _orders.filter(o=>o.estado==="lista");
  else                         list = _orders.filter(o=>o.estado!=="entregada");

  if(!list.length){
    grid.innerHTML="";
    empty.style.display="block";
    return;
  }
  empty.style.display="none";
  grid.innerHTML = list.map(o=>cardHTML(o)).join("");

  // Eventos
  grid.querySelectorAll("[data-lista]").forEach(btn=>{
    btn.addEventListener("click",()=>marcarLista(btn.dataset.lista, btn));
  });
  grid.querySelectorAll("[data-ver]").forEach(btn=>{
    btn.addEventListener("click",()=>openDetalle(btn.dataset.ver));
  });
  grid.querySelectorAll("[data-preguntar]").forEach(btn=>{
    btn.addEventListener("click",()=>openDuda(btn.dataset.preguntar));
  });
}

function cardHTML(o){
  const num    = String(o.numero||0).padStart(3,"0");
  const estado = o.estado||"pendiente";
  const barCls = {pendiente:"pendiente","con-duda":"con-duda",lista:"lista"}[estado]||"pendiente";
  const bdgLbl = {pendiente:"Pendiente","con-duda":"Con duda",lista:"Lista"}[estado]||estado;
  const isLista = estado==="lista";

  let preview="";
  if(o.tipo==="estrella"){
    const colores = o.estrella?.colores||[];
    const dots = colores.slice(0,4).map(c=>
      `<div class="card__color-chip">
        <span class="card__color-dot" style="background:${esc(c.hex)}"></span>
        <span>${esc(c.nombre)}</span>
      </div>`).join("");
    const mas = colores.length>4?`<span style="font-size:12px;color:var(--muted);font-weight:700">+${colores.length-4} más</span>`:"";
    const tema = o.estrella?.tematica?`<div class="card__tematica">${esc(o.estrella.emoji||"")} ${esc(o.estrella.tematica)}</div>`:"";
    preview=`<div class="card__pinata">
      <div class="card__pinata-type">Estrella · ${colores.length} color${colores.length!==1?"es":""}</div>
      <div class="card__colors">${dots}${mas}</div>
      ${tema}
    </div>`;
  } else {
    const img = o.personalizada?.imagen
      ?`<img class="card__thumb" src="${o.personalizada.imagen}" alt="Referencia" loading="lazy" data-ver="${o.id}"/>`:"";
    const desc = o.personalizada?.descripcion
      ?`<div class="card__desc">${esc(o.personalizada.descripcion)}</div>`:"";
    preview=`<div class="card__pinata">
      <div class="card__pinata-type">Personalizada</div>
      ${img}${desc}
    </div>`;
  }

  const listaBtn = isLista
    ? `<button class="btn-base btn-verde--done" disabled>✓ Ya está lista</button>`
    : `<button class="btn-base btn-verde" data-lista="${o.id}">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Marcar lista
       </button>`;

  const extras = `
    <button class="btn-base btn-gris" data-ver="${o.id}">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      Ver detalle
    </button>
    <button class="btn-base btn-wa" data-preguntar="${o.id}">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Preguntar
    </button>`;

  return `
    <div class="card">
      <div class="card__bar card__bar--${barCls}"></div>
      <div class="card__body">
        <div class="card__head">
          <div class="card__num">#${num}</div>
          <span class="card__badge badge--${barCls}">${bdgLbl}</span>
        </div>
        <div class="card__client">${esc(o.cliente?.nombre||"—")}</div>
        <div class="card__date">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Recogida: ${fmtShort(o.recogida)}
        </div>
        ${preview}
      </div>
      <div class="card__footer ${isLista?"card__footer--lista":""}">
        ${listaBtn}
        ${isLista?"":extras}
      </div>
    </div>`;
}

/* ── Modal detalle ── */
function openDetalle(id){
  const o = _orders.find(x=>x.id===id);
  if(!o) return;
  const num = String(o.numero||0).padStart(3,"0");
  document.getElementById("detTitle").textContent = `Orden #${num} · ${o.cliente?.nombre||""}`;

  let html = "";

  // Foto grande (personalizada)
  if(o.tipo==="personalizada"&&o.personalizada?.imagen){
    html += `<img class="det-photo" src="${o.personalizada.imagen}" alt="Referencia de la piñata"/>`;
  }

  // Tipo de piñata
  if(o.tipo==="estrella"){
    const colores = o.estrella?.colores||[];
    const chips = colores.map(c=>
      `<div class="det-chip">
        <span class="det-dot" style="background:${esc(c.hex)}"></span>
        ${esc(c.nombre)}
      </div>`).join("");
    html += `<div class="det-section">
      <div class="det-label">Estrella 6 picos — ${colores.length} color${colores.length!==1?"es":""}</div>
      <div class="det-colors">${chips}</div>
      ${o.estrella?.tematica?`<div class="det-tema">${esc(o.estrella.emoji||"")} ${esc(o.estrella.tematica)}</div>`:""}
      ${o.estrella?.notas?`<p style="font-size:13px;color:var(--muted);margin-top:8px">${esc(o.estrella.notas)}</p>`:""}
    </div>`;
  } else {
    if(o.personalizada?.descripcion){
      html += `<div class="det-section">
        <div class="det-label">Descripción / instrucciones</div>
        <div class="det-desc">${esc(o.personalizada.descripcion)}</div>
      </div>`;
    }
  }

  // Info de la orden
  html += `<div class="det-section">
    <div class="det-label">Información de la orden</div>
    <div class="det-row"><span class="det-lbl">Recogida</span><strong>${fmtDate(o.recogida)}</strong></div>
    <div class="det-row"><span class="det-lbl">Cliente</span><span>${esc(o.cliente?.nombre||"—")}</span></div>
    ${o.atendido?`<div class="det-row"><span class="det-lbl">Tomado por</span><span>${esc(o.atendido)}</span></div>`:""}
  </div>`;

  document.getElementById("detBody").innerHTML = html;
  document.getElementById("detModal").classList.add("open");
}

/* ── Modal duda ── */
function openDuda(id){
  _dudaOrderId = id;
  const o = _orders.find(x=>x.id===id);
  if(!o) return;
  const num = String(o.numero||0).padStart(3,"0");
  document.getElementById("dudaInfo").textContent =
    `Orden #${num} · ${o.cliente?.nombre||"—"} · Recogida: ${fmtShort(o.recogida)}`;
  document.getElementById("dudaTexto").value = "";
  document.getElementById("dudaModal").classList.add("open");
  setTimeout(()=>document.getElementById("dudaTexto").focus(), 300);
}

document.getElementById("dudaSendBtn").addEventListener("click",()=>{
  const texto = document.getElementById("dudaTexto").value.trim();
  if(!texto){ document.getElementById("dudaTexto").focus(); showToast("Escribe tu duda primero"); return; }

  const waNum = (_config.whatsapp||"").replace(/\D/g,"");
  if(!waNum){ alert("No hay número de WhatsApp configurado en la piñatería. Pídele al administrador que lo configure en Ajustes."); return; }

  const o = _orders.find(x=>x.id===_dudaOrderId);
  if(!o) return;
  const num = String(o.numero||0).padStart(3,"0");
  let detalle = o.tipo==="estrella"
    ? `Estrella · ${(o.estrella?.colores||[]).length} colores${o.estrella?.tematica?" · "+o.estrella.tematica:""}`
    : "Personalizada"+(o.personalizada?.descripcion?` · ${o.personalizada.descripcion.slice(0,60)}...`:"");

  const msg = [
    `🪅 *Duda sobre orden #${num}*`,
    "",
    `*Cliente:* ${o.cliente?.nombre||"—"}`,
    `*Piñata:* ${detalle}`,
    `*Recogida:* ${fmtDate(o.recogida)}`,
    "",
    `*Duda:* ${texto}`,
  ].join("\n");

  window.open(`https://wa.me/${waNum}?text=${encodeURIComponent(msg)}`,"_blank");
  document.getElementById("dudaModal").classList.remove("open");
  showToast("WhatsApp abierto");
});

/* ── Cerrar modales ── */
document.getElementById("detClose").addEventListener("click",()=>document.getElementById("detModal").classList.remove("open"));
document.getElementById("detModal").addEventListener("click",e=>{ if(e.target===e.currentTarget) e.currentTarget.classList.remove("open"); });
document.getElementById("dudaClose").addEventListener("click",()=>document.getElementById("dudaModal").classList.remove("open"));
document.getElementById("dudaCancelBtn").addEventListener("click",()=>document.getElementById("dudaModal").classList.remove("open"));
document.getElementById("dudaModal").addEventListener("click",e=>{ if(e.target===e.currentTarget) e.currentTarget.classList.remove("open"); });

/* ── Filtros ── */
document.getElementById("filters").addEventListener("click",e=>{
  const chip = e.target.closest("[data-f]");
  if(!chip) return;
  document.querySelectorAll(".fchip").forEach(c=>c.classList.remove("active"));
  chip.classList.add("active");
  _filter = chip.dataset.f;
  render();
});

initCloud();
</script>
</body>
</html>

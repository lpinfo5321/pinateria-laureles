<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enviar foto · Piñatería Laureles</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #fff0f6 0%, #fdf4ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 36px 28px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 22px; font-weight: 900; color: #1a1a1a; margin-bottom: 8px; }
    p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 24px; }
    .upload-zone {
      border: 3px dashed #d8b4fe;
      border-radius: 16px;
      padding: 32px 20px;
      cursor: pointer;
      transition: all 0.2s;
      background: #fdf4ff;
      margin-bottom: 16px;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: #a855f7; background: #f3e8ff; }
    .upload-zone input { display: none; }
    .upload-zone__icon { font-size: 40px; margin-bottom: 10px; }
    .upload-zone__text { font-size: 15px; font-weight: 700; color: #9333ea; }
    .upload-zone__sub { font-size: 12px; color: #999; margin-top: 4px; }
    .preview-wrap { display: none; margin-bottom: 16px; }
    .preview-wrap img { width: 100%; max-height: 280px; object-fit: contain; border-radius: 12px; border: 2px solid #e5e5e5; }
    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ec4899, #a855f7);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .status { margin-top: 18px; font-size: 15px; font-weight: 700; min-height: 24px; }
    .status--ok { color: #15803d; }
    .status--err { color: #dc2626; }
    .status--loading { color: #9333ea; }
    .change-btn {
      display: none;
      margin-top: 10px;
      background: none;
      border: 2px solid #e5e5e5;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 700;
      color: #666;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🪅</div>
    <h1>Envía tu foto de referencia</h1>
    <p>Elige una foto de tu <strong>galería</strong> y la recibiremos automáticamente en la computadora</p>

    <label class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*" />
      <div class="upload-zone__icon">🖼️</div>
      <div class="upload-zone__text">Toca para elegir foto</div>
      <div class="upload-zone__sub">JPG, PNG, HEIC · Máx 10 MB</div>
    </label>

    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" alt="Vista previa" />
    </div>

    <button class="change-btn" id="changeBtn">Cambiar foto</button>

    <button class="btn btn-primary" id="sendBtn" disabled>Enviar foto</button>
    <div class="status" id="statusMsg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL    = "https://cmovllgbckjupficttal.supabase.co";
    const SUPABASE_ANONKEY= "sb_publishable_-9ejqS4waywUzvKri27ZsQ_MMIRNlLS";
    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANONKEY);

    // Leer session ID de URL
    const params  = new URLSearchParams(location.search);
    const session = params.get("s");
    if (!session) {
      document.querySelector(".card").innerHTML = "<div style='font-size:48px'>❌</div><h1>Enlace inválido</h1><p>Escanea el QR desde la computadora de nuevo.</p>";
    }

    const fileInput  = document.getElementById("fileInput");
    const uploadZone = document.getElementById("uploadZone");
    const previewWrap= document.getElementById("previewWrap");
    const previewImg = document.getElementById("previewImg");
    const sendBtn    = document.getElementById("sendBtn");
    const changeBtn  = document.getElementById("changeBtn");
    const statusMsg  = document.getElementById("statusMsg");

    let _imgBase64 = null;

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;
      resizeAndRead(file);
    });

    changeBtn.addEventListener("click", () => {
      fileInput.click();
    });

    function resizeAndRead(file) {
      statusMsg.textContent = "Procesando imagen...";
      statusMsg.className = "status status--loading";
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const maxSide = 1400;
          let w = img.width, h = img.height;
          if (w > maxSide || h > maxSide) {
            if (w > h) { h = Math.round(h * maxSide / w); w = maxSide; }
            else        { w = Math.round(w * maxSide / h); h = maxSide; }
          }
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          _imgBase64 = canvas.toDataURL("image/jpeg", 0.85);
          previewImg.src = _imgBase64;
          uploadZone.style.display = "none";
          previewWrap.style.display = "block";
          changeBtn.style.display = "block";
          sendBtn.disabled = false;
          statusMsg.textContent = "";
          statusMsg.className = "status";
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    sendBtn.addEventListener("click", async () => {
      if (!_imgBase64 || !session) return;
      sendBtn.disabled = true;
      statusMsg.textContent = "Enviando...";
      statusMsg.className = "status status--loading";

      try {
        // Leer colores actuales para no borrar datos
        const { data: cfg } = await _sb.from("app_config")
          .select("colores").eq("id","default").maybeSingle();
        const currentColores = (cfg?.colores && typeof cfg.colores === "object" && !Array.isArray(cfg.colores))
          ? cfg.colores : {};

        const { error } = await _sb.from("app_config").upsert({
          id: "default",
          colores: { ...currentColores, [`upload_${session}`]: _imgBase64 }
        });

        if (error) throw error;

        statusMsg.textContent = "✅ ¡Foto enviada! Ya puedes ver la imagen en la computadora.";
        statusMsg.className = "status status--ok";
        sendBtn.textContent = "¡Enviada!";
        changeBtn.style.display = "none";
      } catch (err) {
        statusMsg.textContent = "❌ Error al enviar. Intenta de nuevo.";
        statusMsg.className = "status status--err";
        sendBtn.disabled = false;
        console.error(err);
      }
    });
  </script>
</body>
</html>
